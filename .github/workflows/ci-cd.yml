name: CI/CD - FIAP X Worker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RESOURCE_GROUP: rg-fiapx-fx2026

jobs:
  build-and-test:
    name: Build e Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore
      - run: dotnet build --no-restore -c Release
      - run: dotnet test --no-build -c Release

  deploy:
    name: Docker e Deploy
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR Info
        id: acr
        run: |
          ACR_NAME=$(az acr list -g ${{ env.RESOURCE_GROUP }} --query "[0].name" -o tsv)
          echo "name=$ACR_NAME" >> $GITHUB_OUTPUT
          echo "server=$(az acr show -n $ACR_NAME --query loginServer -o tsv)" >> $GITHUB_OUTPUT

      - name: ACR Login
        run: az acr login --name ${{ steps.acr.outputs.name }}

      - name: Build and Push
        run: |
          docker build -t ${{ steps.acr.outputs.server }}/fiapx-worker:${{ github.sha }} -t ${{ steps.acr.outputs.server }}/fiapx-worker:latest .
          docker push ${{ steps.acr.outputs.server }}/fiapx-worker:${{ github.sha }}
          docker push ${{ steps.acr.outputs.server }}/fiapx-worker:latest

      - name: Get AKS Credentials
        run: |
          AKS_NAME=$(az aks list -g ${{ env.RESOURCE_GROUP }} --query "[0].name" -o tsv)
          az aks get-credentials -g ${{ env.RESOURCE_GROUP }} -n $AKS_NAME --overwrite-existing

      - name: Deploy Worker
        run: |
          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: fiapx-worker
            namespace: fiapx
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: fiapx-worker
            template:
              metadata:
                labels:
                  app: fiapx-worker
              spec:
                containers:
                - name: fiapx-worker
                  image: ${{ steps.acr.outputs.server }}/fiapx-worker:${{ github.sha }}
                  env:
                  - name: ConnectionStrings__DefaultConnection
                    valueFrom:
                      secretKeyRef:
                        name: fiapx-secrets
                        key: SQL_CONNECTION_STRING
                  - name: RabbitMQ__HostName
                    value: "rabbitmq-service"
                  - name: RabbitMQ__UserName
                    value: "guest"
                  - name: RabbitMQ__Password
                    value: "guest"
                  resources:
                    requests:
                      memory: "128Mi"
                      cpu: "100m"
                    limits:
                      memory: "256Mi"
                      cpu: "250m"
          EOF
          
          kubectl rollout status deployment/fiapx-worker -n fiapx --timeout=300s
          echo "## ✅ Worker Deployado!" >> $GITHUB_STEP_SUMMARY
